<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh">
  <div class="card shadow-sm border-0" style="width: 100%; max-width: 400px">
    <div class="card-body p-5">
      <a routerLink="/" class="text-decoration-none text-muted mb-4 d-block">
        &larr; Volver al inicio
      </a>

      <h3 class="card-title text-center text-primary fw-bold mb-4">Iniciar Sesión</h3>
      <div *ngIf="mensajeError" class="alert alert-danger py-2 mb-3 text-center small" role="alert">
        {{ mensajeError }}
      </div>

      <form>
        <div class="mb-3">
          <label for="emailInput" class="form-label text-muted">Correo Institucional</label>
          <input
            type="email"
            class="form-control form-control-lg"
            id="emailInput"
            name="correo"
            [(ngModel)]="correo"
            placeholder="nombre@colegio.cl"
          />
        </div>

        <div class="mb-4">
          <label for="passwordInput" class="form-label text-muted">Contraseña</label>
          <input
            type="password"
            class="form-control form-control-lg"
            id="passwordInput"
            name="contrasena"
            [(ngModel)]="contrasena"
            placeholder="********"
          />
        </div>
        <button type="button" class="btn btn-primary btn-lg w-100" (click)="iniciarSesion()">
          Ingresar al Sistema de Protocolos
        </button>
      </form>
    </div>
  </div>
</div>
