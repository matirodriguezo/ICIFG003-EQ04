<nav class="navbar navbar-dark bg-dark px-4 shadow-sm mb-4 border-bottom border-3 border-secondary">
  <div class="d-flex align-items-center">
    <button class="btn btn-outline-light btn-sm me-3 px-3 rounded-pill" routerLink="/menu">&larr; Volver</button>
    <span class="navbar-brand fw-bold mb-0">Catálogo de Protocolos Oficiales</span>
  </div>
</nav>

<div class="container-fluid px-4 pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      
      <div class="card shadow-sm border-0 rounded-4 border-start border-5 border-secondary">
        <div class="card-header bg-white pt-4 pb-2 border-0 d-flex justify-content-between align-items-center">
          <div>
            <h5 class="text-dark fw-bold mb-1">Listado Normativo (Solo Lectura)</h5>
            <p class="text-muted small mb-0">Gestione la vigencia de los protocolos institucionales.</p>
          </div>
        </div>
        
        <div class="card-body p-0 mt-2">
          <div class="table-responsive" style="max-height: 70vh; overflow-y: auto;">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light sticky-top">
                <tr>
                  <th scope="col" width="30%" class="ps-4">Nombre del Protocolo</th>
                  <th scope="col" width="55%">Descripción</th>
                  <th scope="col" width="15%" class="text-center pe-4">Estado Vigente</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let p of protocolos" [ngClass]="{'opacity-50 bg-light': !p.activo}">
                  <td class="ps-4 fw-bold text-dark">{{p.nombreProtocolo}}</td>
                  <td class="small text-muted">{{p.descripcion}}</td>
                  <td class="text-center pe-4">
                    <button class="btn btn-sm w-100 rounded-pill shadow-sm" 
                            [ngClass]="p.activo ? 'btn-success' : 'btn-outline-secondary'" 
                            (click)="cambiarEstado(p)">
                      {{p.activo ? 'Habilitado' : 'Deshabilitado'}}
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
