<nav class="navbar navbar-dark bg-primary px-4 shadow-sm mb-4">
  <span class="navbar-brand fw-bold">Módulo: Gestión de Alumnos</span>
  <button class="btn btn-light btn-sm" routerLink="/menu">Volver al Menú</button>
</nav>

<div class="container-fluid px-4">
  <div class="row g-4">
    
    <div class="col-md-4">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
          <h5 class="text-primary fw-bold">{{ persona.id === 0 ? 'Nuevo Registro' : 'Editar Registro' }}</h5>
        </div>
        <div class="card-body">
          <form (ngSubmit)="guardar()">
            
            <div class="mb-3">
              <label class="form-label text-muted small">RUT</label>
              <input type="text" class="form-control" [(ngModel)]="persona.rut" name="rut" placeholder="Ej: 20.111.111-1" required>
            </div>

            <div class="mb-3">
              <label class="form-label text-muted small">Nombre</label>
              <input type="text" class="form-control" [(ngModel)]="persona.nombre" name="nombre" placeholder="Nombre del alumno" required>
            </div>

            <div class="mb-3">
              <label class="form-label text-muted small">Apellido</label>
              <input type="text" class="form-control" [(ngModel)]="persona.apellido" name="apellido" placeholder="Apellido paterno/materno" required>
            </div>

            <div class="mb-4">
              <label class="form-label text-muted small">Curso</label>
              <select class="form-select" [(ngModel)]="persona.curso" name="curso" required>
                <option value="" disabled selected>Seleccione un curso...</option>
                <option value="7°A">7° Básico A</option>
                <option value="7°B">7° Básico B</option>
                <option value="8°A">8° Básico A</option>
                <option value="8°B">8° Básico B</option>
                <option value="1°M">1° Medio</option>
                <option value="2°M">2° Medio</option>
              </select>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">{{ persona.id === 0 ? 'Guardar Alumno' : 'Actualizar Datos' }}</button>
              <button type="button" class="btn btn-outline-secondary" (click)="limpiar()" *ngIf="persona.id !== 0">Cancelar Edición</button>
            </div>

          </form>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card shadow-sm border-0">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th scope="col" class="ps-4">ID</th>
                  <th scope="col">RUT</th>
                  <th scope="col">Nombre</th>
                  <th scope="col">Apellido</th>
                  <th scope="col">Curso</th>
                  <th scope="col" class="text-end pe-4">Acciones</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let p of personas">
                  <td class="ps-4 text-muted fw-bold">#{{p.id}}</td>
                  <td>{{p.rut}}</td>
                  <td>{{p.nombre}}</td>
                  <td>{{p.apellido}}</td>
                  <td><span class="badge bg-secondary">{{p.curso}}</span></td>
                  <td class="text-end pe-4">
                    <button class="btn btn-sm btn-outline-primary me-2" (click)="editar(p)">Editar</button>
                    <button class="btn btn-sm btn-outline-danger" (click)="eliminar(p.id)">Eliminar</button>
                  </td>
                </tr>
                <tr *ngIf="personas.length === 0">
                  <td colspan="6" class="text-center text-muted py-4">No hay alumnos registrados en el sistema.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
